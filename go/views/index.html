<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paylabs Callback Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui"],
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        transition:
          background-color 0.3s,
          color 0.3s;
      }
      .fade-in {
        animation: fadeIn 0.3s ease-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      pre {
        white-space: pre-wrap;
        word-wrap: break-word;
        margin: 0;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }

      /* Light Mode Scrollbar */
      ::-webkit-scrollbar-thumb {
        background: #d1d5db;
        border-radius: 10px;
        border: 2px solid transparent;
        background-clip: content-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #9ca3af;
        border-radius: 10px;
        border: 2px solid transparent;
        background-clip: content-box;
      }

      /* Dark Mode Scrollbar */
      .dark ::-webkit-scrollbar-thumb {
        background: #475569;
      }
      .dark ::-webkit-scrollbar-thumb:hover {
        background: #64748b;
      }
    </style>
  </head>
  <body
    class="bg-gray-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 min-h-screen"
  >
    <!-- Connection Status Badge -->
    <div
      id="connection-status"
      class="fixed bottom-4 right-4 z-50 px-3 py-1.5 rounded-full text-xs font-medium shadow-lg bg-yellow-400 text-yellow-900"
    >
      Connecting...
    </div>

    <div class="max-w-4xl mx-auto px-4 py-6">
      <!-- Header -->
      <div class="text-center mb-6">
        <h1 class="text-2xl font-bold text-indigo-600 dark:text-indigo-400">
          Paylabs Callback Visualizer
        </h1>
        <p class="text-gray-500 dark:text-slate-400 text-sm mt-1">
          Real-time monitoring for QRIS & SNAP Transactions
        </p>
      </div>

      <!-- Tabs + Controls -->
      <div class="flex items-center justify-center gap-3 mb-5">
        <div class="flex gap-1 bg-gray-100 dark:bg-slate-800 p-1 rounded-lg">
          <button
            id="tab-all-btn"
            class="tab-btn px-4 py-2 text-sm font-medium rounded-md bg-white dark:bg-slate-700 text-indigo-600 dark:text-indigo-300 shadow-sm"
            data-tab="tab-all"
          >
            All
          </button>
          <button
            id="tab-inbound-btn"
            class="tab-btn px-4 py-2 text-sm font-medium rounded-md text-gray-500 dark:text-slate-400 hover:text-gray-700 dark:hover:text-slate-200"
            data-tab="tab-inbound"
          >
            Inbound
          </button>
          <button
            id="tab-outbound-btn"
            class="tab-btn px-4 py-2 text-sm font-medium rounded-md text-gray-500 dark:text-slate-400 hover:text-gray-700 dark:hover:text-slate-200"
            data-tab="tab-outbound"
          >
            Outbound
          </button>
        </div>

        <div
          class="flex items-center gap-2 border-l border-gray-200 dark:border-slate-700 pl-3"
        >
          <button
            id="theme-toggle"
            class="p-2 rounded-md hover:bg-gray-100 dark:hover:bg-slate-800 text-gray-500 dark:text-slate-400 transition-colors"
            title="Toggle Theme"
          >
            <svg
              id="theme-icon-light"
              class="hidden w-5 h-5"
              fill="currentColor"
              viewBox="0 0 20 20"
            >
              <path
                d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"
              />
            </svg>
            <svg
              id="theme-icon-dark"
              class="w-5 h-5"
              fill="currentColor"
              viewBox="0 0 20 20"
            >
              <path
                d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"
              />
            </svg>
          </button>

          <button
            id="clear-all-btn"
            class="px-3 py-1.5 text-xs font-medium text-red-600 dark:text-red-400 bg-red-50 dark:bg-red-900/20 hover:bg-red-100 dark:hover:bg-red-900/30 rounded-md border border-red-200 dark:border-red-900/50 transition-colors"
          >
            Clear
          </button>
        </div>
      </div>

      <!-- Tab Content -->
      <div id="tab-all" class="tab-pane">
        <div id="list-all" class="space-y-3">
          <div
            class="empty-state bg-white dark:bg-slate-800 rounded-lg shadow p-8 text-center text-gray-400 dark:text-slate-500 border border-transparent dark:border-slate-700"
          >
            <svg
              class="animate-spin h-6 w-6 text-indigo-500 mx-auto mb-3"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
              ></path>
            </svg>
            <p class="text-sm font-medium text-gray-600 dark:text-slate-400">
              Waiting for activity...
            </p>
          </div>
        </div>
      </div>

      <div id="tab-inbound" class="tab-pane hidden">
        <div id="list-inbound" class="space-y-3">
          <p
            class="empty-state text-center text-gray-400 dark:text-slate-500 text-sm py-8"
          >
            No inbound callbacks yet.
          </p>
        </div>
      </div>

      <div id="tab-outbound" class="tab-pane hidden">
        <div id="list-outbound" class="space-y-3">
          <p
            class="empty-state text-center text-gray-400 dark:text-slate-500 text-sm py-8"
          >
            No outbound requests yet.
          </p>
        </div>
      </div>

      <!-- Footer -->
      <footer
        class="mt-8 text-center text-gray-400 dark:text-slate-500 text-xs"
      >
        <p>&copy; 2026 Paylabs Quick Start Guide</p>
      </footer>
    </div>

    <script src="js/client.js"></script>
  </body>
</html>
